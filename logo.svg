<svg width="800" height="320" viewBox="0 0 800 320" xmlns="http://www.w3.org/2000/svg">

  <defs>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffe27a"/>
      <stop offset="100%" stop-color="#ff9900"/>
    </linearGradient>

    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="320" fill="#050505"/>

  <!-- Rotating Gold Ring -->
  <circle cx="400" cy="150"
          r="120"
          fill="none"
          stroke="url(#gold)"
          stroke-width="8"
          stroke-dasharray="25 10"
          filter="url(#glow)">

    <animateTransform
      attributeName="transform"
      type="rotate"
      from="0 400 150"
      to="360 400 150"
      dur="12s"
      repeatCount="indefinite"/>
  </circle>

  <!-- NCGT TEXT -->
  <text x="400"
        y="130"
        text-anchor="middle"
        font-size="90"
        font-family="Arial Black"
        fill="url(#gold)"
        filter="url(#glow)">
    NCGT
  </text>

  <!-- Road -->
  <line x1="0" y1="250" x2="800" y2="250"
        stroke="#333"
        stroke-width="8"
        stroke-dasharray="25 15"/>

  <!-- MOVING TRUCK -->
  <g>

    <!-- MOVE ONLY ONE WAY -->
    <animateTransform
      attributeName="transform"
      type="translate"
      values="-350 0; 950 0"
      dur="7s"
      repeatCount="indefinite"/>

    <!-- Speed Lines -->
    <line x1="90" y1="190" x2="20" y2="190"
          stroke="#ffcc00"
          stroke-width="5">
      <animate attributeName="opacity"
               values="1;0.2;1"
               dur="0.4s"
               repeatCount="indefinite"/>
    </line>

    <line x1="90" y1="210" x2="35" y2="210"
          stroke="#ff9900"
          stroke-width="3">
      <animate attributeName="opacity"
               values="0.2;1;0.2"
               dur="0.5s"
               repeatCount="indefinite"/>
    </line>

    <!-- Cargo -->
    <rect x="110" y="170"
          width="150"
          height="55"
          rx="8"
          fill="#ffffff"/>

    <!-- Small Black NCGT -->
    <text x="185"
          y="205"
          text-anchor="middle"
          font-size="24"
          font-family="Arial Black"
          fill="#000000">
      NCGT
    </text>

    <!-- Cabin -->
    <rect x="245" y="185"
          width="55"
          height="40"
          rx="6"
          fill="#dddddd"/>

    <!-- Window -->
    <rect x="258" y="192"
          width="18"
          height="12"
          fill="#222"/>

    <!-- Headlight -->
    <circle cx="300" cy="214" r="4" fill="#ffd700">
      <animate attributeName="opacity"
               values="1;0.3;1"
               dur="0.6s"
               repeatCount="indefinite"/>
    </circle>

    <!-- Wheels -->
    <g>
      <circle cx="145" cy="235" r="16" fill="#111"/>
      <circle cx="145" cy="235" r="6" fill="#888"/>

      <animateTransform
        attributeName="transform"
        type="rotate"
        from="0 145 235"
        to="360 145 235"
        dur="1s"
        repeatCount="indefinite"/>
    </g>

    <g>
      <circle cx="260" cy="235" r="16" fill="#111"/>
      <circle cx="260" cy="235" r="6" fill="#888"/>

      <animateTransform
        attributeName="transform"
        type="rotate"
        from="0 260 235"
        to="360 260 235"
        dur="1s"
        repeatCount="indefinite"/>
    </g>

  </g>

  <!-- Glow Particles -->
  <circle cx="180" cy="70" r="4" fill="#ffd700">
    <animate attributeName="opacity"
             values="1;0;1"
             dur="2s"
             repeatCount="indefinite"/>
  </circle>

  <circle cx="620" cy="90" r="5" fill="#ffcc00">
    <animate attributeName="opacity"
             values="0;1;0"
             dur="3s"
             repeatCount="indefinite"/>
  </circle>

</svg>